    <style>
        :root {
            --bg: #0e0d0b;
            --fg: #ece8dd;
            --subdued: #bcb6a8;
            --muted: #6e6a60;
            --accent: #fdbaae;
            --accent-soft: rgba(253, 186, 174, 0.12);
            --rule: rgba(236, 232, 221, 0.12);
            --display: 'Inter Tight', 'Inter', -apple-system, sans-serif;
            --mono: 'JetBrains Mono', ui-monospace, monospace;
            --safe-top: env(safe-area-inset-top, 0);
            --safe-bottom: env(safe-area-inset-bottom, 0);
        }

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: var(--display);
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            padding-top: max(24px, var(--safe-top));
            padding-bottom: max(24px, var(--safe-bottom));
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── animated background ── */
        .scene {
            position: fixed; inset: 0; z-index: 0;
            overflow: hidden; pointer-events: none;
        }
        .scene__glow {
            position: absolute;
            width: 520px; height: 520px;
            border-radius: 50%;
            filter: blur(180px);
            opacity: 0.18;
            background: var(--accent);
        }
        .scene__glow--tl { top: -200px; left: -100px; }
        .scene__glow--br { bottom: -180px; right: -60px; opacity: 0.1; }

        .scene__dots {
            position: absolute; inset: -40px;
            background-image: radial-gradient(var(--rule) 0.7px, transparent 0.7px);
            background-size: 14px 14px;
            animation: drift-x 50s linear infinite;
            opacity: 0.6;
        }
        .scene__grid {
            position: absolute; inset: -40px;
            background-image:
                linear-gradient(to right, var(--rule) 1px, transparent 1px),
                linear-gradient(to bottom, var(--rule) 1px, transparent 1px);
            background-size: 56px 56px;
            animation: drift-y 70s linear infinite;
            opacity: 0.35;
        }
        .scene__scan-h {
            position: absolute; left: 0; right: 0; height: 1px;
            background: linear-gradient(to right, transparent, var(--accent), transparent);
            box-shadow: 0 0 24px var(--accent);
            animation: scan-h 10s linear infinite;
        }
        .scene__scan-v {
            position: absolute; top: 0; bottom: 0; width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(236,232,221,0.3), transparent);
            animation: scan-v 15s linear infinite 3s;
        }

        /* corner registration marks */
        .scene__corner { position: absolute; opacity: 0.4; }
        .scene__corner--tl { top: 20px; left: 20px; }
        .scene__corner--br { bottom: 20px; right: 20px; }

        @keyframes drift-x { from { transform: translateX(0) } to { transform: translateX(-40px) } }
        @keyframes drift-y { from { transform: translateY(0) } to { transform: translateY(-40px) } }
        @keyframes scan-h {
            0% { transform: translateY(-10%); opacity: 0 }
            10% { opacity: 1 } 90% { opacity: 1 }
            100% { transform: translateY(110%); opacity: 0 }
        }
        @keyframes scan-v {
            0% { transform: translateX(-10%); opacity: 0 }
            10% { opacity: 1 } 90% { opacity: 1 }
            100% { transform: translateX(110%); opacity: 0 }
        }

        /* ── page layout ── */
        .page {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px;
            opacity: 0;
            animation: enter 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
        }

        @keyframes enter {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── card ── */
        .card {
            border: 1px solid var(--rule);
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        /* top accent line */
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent) 30%, var(--accent) 70%, transparent);
        }

        /* ── profile header ── */
        .profile {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 24px;
            padding: 32px 28px 28px;
            align-items: center;
            border-bottom: 1px solid var(--rule);
        }

        .profile__image-wrap {
            position: relative;
            width: 100px; height: 100px;
        }
        .profile__image-wrap::after {
            content: '';
            position: absolute; inset: 0;
            border: 1px solid var(--accent);
            transform: translate(6px, 6px);
            pointer-events: none;
        }
        .profile__image {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: contrast(1.05) saturate(0.9);
            position: relative; z-index: 1;
            display: block;
        }

        .profile__info { min-width: 0; }
        .profile__status {
            display: inline-flex; align-items: center; gap: 8px;
            font-family: var(--mono); font-size: 10px;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 12px;
        }
        .profile__dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent);
            animation: pulse 2.2s ease-out infinite;
            position: relative;
        }
        .profile__dot::after {
            content: ''; position: absolute; inset: 0;
            border-radius: 50%; background: var(--accent);
            animation: pulse-ring 2.2s ease-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.6 } }
        @keyframes pulse-ring { 0% { transform: scale(1); opacity: 0.5 } 100% { transform: scale(2.8); opacity: 0 } }

        .profile__name {
            font-size: 28px; font-weight: 600;
            letter-spacing: -0.03em; line-height: 1;
            margin-bottom: 8px;
        }
        .profile__title {
            font-family: var(--mono); font-size: 11px;
            color: var(--muted); letter-spacing: 0.14em;
            text-transform: uppercase; line-height: 1.6;
        }

        /* ── contact rows ── */
        .channels { padding: 0; }

        .channel {
            display: grid;
            grid-template-columns: 48px 1fr auto;
            gap: 0;
            align-items: center;
            padding: 18px 28px;
            border-bottom: 1px solid var(--rule);
            text-decoration: none; color: inherit;
            transition: background 0.25s;
            -webkit-tap-highlight-color: transparent;
        }
        .channel:last-child { border-bottom: none; }
        .channel:hover { background: var(--accent-soft); }
        .channel:hover .channel__arrow { opacity: 1; transform: translateX(0); color: var(--accent); }

        .channel__icon {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--rule); color: var(--accent);
            transition: border-color 0.25s;
        }
        .channel:hover .channel__icon { border-color: var(--accent); }
        .channel__icon svg { width: 16px; height: 16px; }

        .channel__text { padding-left: 16px; min-width: 0; }
        .channel__label {
            font-family: var(--mono); font-size: 9px;
            color: var(--accent); letter-spacing: 0.2em;
            text-transform: uppercase; margin-bottom: 2px;
        }
        .channel__value {
            font-size: 15px; letter-spacing: -0.02em;
            color: var(--fg); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .channel__arrow {
            font-family: var(--mono); font-size: 14px;
            color: var(--muted); opacity: 0;
            transform: translateX(-4px);
            transition: all 0.25s;
        }

        /* ── actions ── */
        .actions {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 1px; background: var(--rule);
            border-top: 1px solid var(--rule);
        }

        .action-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; padding: 18px 16px;
            background: var(--bg); border: none;
            color: var(--fg); cursor: pointer;
            font-family: var(--mono); font-size: 11px;
            letter-spacing: 0.14em; text-transform: uppercase;
            transition: all 0.25s;
            -webkit-tap-highlight-color: transparent;
        }
        .action-btn:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .action-btn--primary {
            background: var(--accent); color: var(--bg);
        }
        .action-btn--primary:hover {
            background: #fecfc6; color: var(--bg);
        }
        .action-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

        /* ── social links ── */
        .socials {
            display: flex; justify-content: center;
            gap: 0; border-top: 1px solid var(--rule);
        }

        .social {
            flex: 1; display: flex;
            align-items: center; justify-content: center;
            padding: 20px 0;
            color: var(--muted);
            text-decoration: none;
            transition: all 0.25s;
            border-right: 1px solid var(--rule);
            -webkit-tap-highlight-color: transparent;
        }
        .social:last-child { border-right: none; }
        .social:hover { color: var(--accent); background: var(--accent-soft); }
        .social svg { width: 20px; height: 20px; }

        /* ── footer stamp ── */
        .stamp {
            margin-top: 20px;
            display: flex; justify-content: space-between; align-items: center;
            font-family: var(--mono); font-size: 9px;
            color: var(--muted); letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0 4px;
        }
        .stamp a {
            color: var(--accent); text-decoration: none;
        }
        .stamp a:hover { text-decoration: underline; }

        /* ── toast notification ── */
        .toast {
            position: fixed; bottom: 32px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--fg); color: var(--bg);
            font-family: var(--mono); font-size: 11px;
            letter-spacing: 0.1em; text-transform: uppercase;
            padding: 12px 20px;
            opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 100;
        }
        .toast.visible {
            opacity: 1; transform: translateX(-50%) translateY(0);
        }

        /* ── responsive ── */
        @media (max-width: 480px) {
            body { padding: 16px; }
            .page { max-width: 100%; }
            .profile {
                grid-template-columns: 80px 1fr;
                gap: 18px; padding: 24px 20px 22px;
            }
            .profile__image-wrap { width: 80px; height: 80px; }
            .profile__name { font-size: 24px; }
            .channel { padding: 16px 20px; grid-template-columns: 40px 1fr auto; }
            .channel__icon { width: 32px; height: 32px; }
            .channel__icon svg { width: 14px; height: 14px; }
            .channel__text { padding-left: 12px; }
            .channel__value { font-size: 14px; }
            .channel__arrow { display: none; }
            .action-btn { padding: 16px 12px; font-size: 10px; gap: 8px; }
            .social { padding: 16px 0; }
            .social svg { width: 18px; height: 18px; }
            .stamp { margin-top: 16px; font-size: 8px; }
            .scene__corner { display: none; }
        }

        @media (prefers-reduced-motion: reduce) {
            .page { animation: none; opacity: 1; }
            .scene__dots, .scene__grid { animation: none; }
            .scene__scan-h, .scene__scan-v { animation: none; display: none; }
            .profile__dot::after { animation: none; }
        }
    </style>
</head>

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                </a>
            </div>
        </div>

        <!-- Footer stamp -->
        <div class="stamp">
            <span>Signal &middot; <a href="https://saikrishna.tech">saikrishna.tech</a></span>
            <span>Bengaluru &middot; IST</span>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        function downloadVCard() {
            const vCard = `BEGIN:VCARD
VERSION:3.0
FN:Sai Krishna
N:Krishna;Sai;;;
EMAIL:saidotkrishna@gmail.com
TEL;TYPE=CELL:+919986923423
URL:https://saikrishna.tech
TITLE:Director of Engineering
ORG:TestMu AI
NOTE:Author, Open-Source Contributor, Appium Core Maintainer
X-SOCIALPROFILE;TYPE=linkedin:https://www.linkedin.com/in/sai-krishna-3755407b/
X-SOCIALPROFILE;TYPE=twitter:https://twitter.com/saikrisv
X-SOCIALPROFILE;TYPE=github:https://github.com/saikrishna321
END:VCARD`;
            const blob = new Blob([vCard], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'sai-krishna-contact.vcf';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);
            showToast('Contact saved');
        }

        async function shareContact() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Sai Krishna — Contact',
                        text: 'Director of Engineering at TestMu AI · Author · Open-Source Contributor',
                        url: window.location.href
                    });
                } catch (e) {
                    // User cancelled
                }
            } else {
                try {
                    await navigator.clipboard.writeText(window.location.href);
                    showToast('Link copied');
                } catch {
                    showToast('Could not copy');
                }
            }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('visible');
            setTimeout(() => t.classList.remove('visible'), 2200);
        }
    </script>
